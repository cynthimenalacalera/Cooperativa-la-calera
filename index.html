<!DOCTYPE html>
<html>
<head>
  <title>Cooperativa App</title>
</head>
<body>

<h1>Pacientes</h1>

<button onclick="cargar()">Ver pacientes</button>

<ul id="lista"></ul>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://vdabvszahxpjmgxpemgn.supabase.co/rest/v1/"
const supabaseKey = "sb_publishable___FcTfQuEtR095iTe6eDcg_o-XdzTgv"

const supabase = createClient(supabaseUrl, supabaseKey)

window.cargar = async function () {
  const { data, error } = await supabase
    .from("pacientes")
    .select("*")

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (error) {
    alert(error.message)
    return
  }

  data.forEach(p => {
    const li = document.createElement("li")
    li.textContent = p.nombre || "sin nombre"
    lista.appendChild(li)
  })
}
</script>

</body>
</html>
