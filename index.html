<!DOCTYPE html>
<html>
<head>
  <title>Cooperativa App</title>
</head>
<body>

<h1>Pacientes</h1>

<input id="nombre" placeholder="Nombre del paciente" />

<button onclick="agregar()">Agregar paciente</button>

<hr>

<button onclick="cargar()">Ver pacientes</button>

<ul id="lista"></ul>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://vdabvszahxpjmgxpemgn.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkYWJ2c3phaHhwam1neHBlbWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQ1NjIsImV4cCI6MjA5NTgyMDU2Mn0.abNVe2zfu5smyxoZ5Abjdoc398lxJJmf1vs-Cu5sFm0"

const supabase = createClient(supabaseUrl, supabaseKey)

window.agregar = async function () {
  const nombre = document.getElementById("nombre").value

  const { error } = await supabase
    .from("pacientes")
    .insert([{ nombre }])

  if (error) {
    alert(error.message)
    return
  }

  alert("Paciente agregado ✔️")
  document.getElementById("nombre").value = ""
}

window.cargar = async function () {
  const { data, error } = await supabase
    .from("pacientes")
    .select("*")

  if (error) {
    alert(error.message)
    return
  }

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  data.forEach(p => {
    const li = document.createElement("li")
    li.textContent = p.nombre
    lista.appendChild(li)
  })
}
</script>
</body>
</html>
