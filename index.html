<!DOCTYPE html>
<html>

  <title>Cooperativa App</title>

<body>

<h1>Pacientes</h1>

<button onclick="cargar()">Ver pacientes</button>

<ul id="lista"></ul>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://vdabvszahxpjmgxpemgn.supabase.co/rest/v1/"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZkYWJ2c3phaHhwam1neHBlbWduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQ1NjIsImV4cCI6MjA5NTgyMDU2Mn0.abNVe2zfu5smyxoZ5Abjdoc398lxJJmf1vs-Cu5sFm0"

const supabase = createClient(supabaseUrl, supabaseKey)

window.cargar = async function () {
  console.log("click OK")

  const { data, error } = await supabase
    .from("pacientes")
    .select("*")

  console.log("DATA:", data)
  console.log("ERROR:", error)

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  if (error) {
    alert(error.message)
    return
  }

  data.forEach(p => {
    const li = document.createElement("li")
    li.textContent = p.nombre || "sin nombre"
    lista.appendChild(li)
  })
}
</script>

</body>
</html>
